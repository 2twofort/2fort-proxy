<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2Fort Proxy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0f0b05;
      --surface: #1a1008;
      --card:    #201408;
      --border:  #3d2510;
      --accent:  #c87d2f;
      --gold:    #e8a84a;
      --text:    #f0dfc0;
      --muted:   #8a6040;
      --dim:     #4a2e0e;
      --green:   #5dbb63;
      --red:     #c0392b;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(200,125,47,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,125,47,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: relative; z-index: 10;
      display: flex; align-items: center;
      height: 54px; flex-shrink: 0;
      padding: 0 20px;
      background: rgba(15,11,5,0.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      gap: 16px;
    }

    .logo-wrap {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; flex-shrink: 0;
    }
    .logo-img {
      width: 26px; height: 26px; object-fit: contain;
      mix-blend-mode: screen; filter: brightness(1.1);
    }
    .logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 19px; letter-spacing: 2px; color: var(--accent);
    }

    .bar-div { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

    .tab-row { display: flex; align-items: center; gap: 2px; }
    .tab-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 6px;
      font-size: 12px; font-weight: 600; color: var(--muted);
      cursor: pointer; text-decoration: none;
      transition: all 0.14s; white-space: nowrap;
      border: 1px solid transparent;
    }
    .tab-item:hover { color: var(--text); background: rgba(200,125,47,0.06); }
    .tab-item.active { color: var(--text); background: var(--surface); border-color: var(--border); }
    .tab-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    .bar-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; margin-left: auto; }

    .pill-row { display: flex; align-items: center; gap: 6px; }
    .status-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      border: 1px solid var(--border); color: var(--muted);
      background: var(--surface); white-space: nowrap;
    }
    .s-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; transition: all 0.3s;
    }
    .s-dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pdot 2.5s infinite; }
    .s-dot.bad { background: var(--red); }
    @keyframes pdot {
      0%,100% { box-shadow: 0 0 4px var(--green); }
      50%      { box-shadow: 0 0 10px var(--green); }
    }

    .icon-btn {
      width: 30px; height: 30px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); text-decoration: none; font-size: 14px;
      transition: all 0.14s; flex-shrink: 0;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MAIN ── */
    .main {
      position: relative; z-index: 1;
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 20px 24px 14px; min-height: 0;
    }

    /* ── CLOCK above search ── */
    .clock-block {
      width: 100%; max-width: 760px;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      margin-bottom: 20px; gap: 4px;
    }
    .clock-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 88px; letter-spacing: 6px;
      color: var(--text); line-height: 1;
    }
    .clock-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 600;
      color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
    }
    .clock-tz {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--muted); letter-spacing: 0.5px;
    }

    /* ── URL BAR ── */
    .url-zone { width: 100%; max-width: 760px; }

    .url-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; letter-spacing: 2px; color: var(--muted);
      text-transform: uppercase; margin-bottom: 7px;
      display: flex; align-items: center; gap: 8px;
    }
    .url-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    .url-bar {
      display: flex; align-items: stretch;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      transition: border-color 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .url-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,125,47,0.1), 0 4px 24px rgba(0,0,0,0.5);
    }

    .url-scheme {
      display: flex; align-items: center; padding: 0 14px;
      background: rgba(200,125,47,0.08);
      border-right: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--accent); flex-shrink: 0;
    }
    .url-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'JetBrains Mono', monospace;
      font-size: 14px; padding: 14px 16px; min-width: 0;
    }
    .url-input::placeholder { color: var(--dim); }
    .url-go {
      background: var(--accent); border: none; color: #0f0b05;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800;
      padding: 0 22px; cursor: pointer; flex-shrink: 0;
      transition: background 0.18s; letter-spacing: 0.5px;
    }
    .url-go:hover { background: var(--gold); }

    .quick-row {
      display: flex; align-items: center; gap: 6px;
      margin-top: 9px; flex-wrap: wrap;
    }
    .quick-lbl {
      font-size: 10px; font-weight: 600; color: var(--dim);
      letter-spacing: 0.5px; font-family: 'JetBrains Mono', monospace;
    }
    .qpill {
      font-size: 11px; font-weight: 600; color: var(--muted);
      background: none; border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 10px;
      cursor: pointer; transition: all 0.14s; font-family: 'Syne', sans-serif;
    }
    .qpill:hover { color: var(--accent); border-color: var(--accent); background: rgba(200,125,47,0.07); }

    /* ── DIVIDER ── */
    .section-divider {
      width: 100%; max-width: 760px;
      display: flex; align-items: center; gap: 10px;
      margin: 16px 0 12px;
    }
    .section-divider span {
      font-size: 10px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--muted); white-space: nowrap;
    }
    .section-divider::before, .section-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── GRID ── */
    .grid-wrap { width: 100%; max-width: 760px; }

    /* delete button on each card */
    .ql-del {
      position: absolute; top: 5px; right: 6px;
      width: 18px; height: 18px; border-radius: 4px;
      background: rgba(192,57,43,0.0); border: none;
      color: transparent; font-size: 11px; line-height: 18px; text-align: center;
      cursor: pointer; transition: all 0.15s; padding: 0;
    }
    .ql-card:hover .ql-del {
      background: rgba(192,57,43,0.25); color: #ff9988;
    }
    .ql-del:hover { background: rgba(192,57,43,0.7) !important; color: #fff !important; }

    /* + add card */
    .ql-add {
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 10px; padding: 14px 10px 11px;
      text-align: center; cursor: pointer;
      transition: all 0.18s; display: flex;
      flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      color: var(--muted); min-height: 90px;
    }
    .ql-add:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,125,47,0.05); }
    .ql-add-icon { font-size: 22px; line-height: 1; }
    .ql-add-lbl { font-size: 11px; font-weight: 700; letter-spacing: 1px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px; width: 340px; max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 22px;
      letter-spacing: 2px; color: var(--text); margin-bottom: 18px;
    }
    .modal label {
      display: block; font-size: 10px; font-weight: 700;
      letter-spacing: 2px; color: var(--muted); margin-bottom: 5px;
      text-transform: uppercase;
    }
    .modal-field { margin-bottom: 14px; }
    .modal input {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      padding: 9px 12px; outline: none; transition: border-color 0.15s;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 8px; margin-top: 6px; }
    .modal-cancel {
      flex: 1; background: none; border: 1px solid var(--border);
      border-radius: 7px; color: var(--muted); font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 700; padding: 9px; cursor: pointer;
      transition: all 0.15s;
    }
    .modal-cancel:hover { border-color: var(--muted); color: var(--text); }
    .modal-confirm {
      flex: 2; background: var(--accent); border: none;
      border-radius: 7px; color: #0f0b05; font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 800; padding: 9px; cursor: pointer;
      transition: background 0.15s; letter-spacing: 0.5px;
    }
    .modal-confirm:hover { background: var(--gold); }

    .ql-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .ql-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 10px 11px;
      text-align: center; cursor: pointer;
      transition: all 0.18s; position: relative; overflow: hidden;
    }
    .ql-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0; transition: opacity 0.22s;
    }
    .ql-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
    .ql-card:hover::before { opacity: 1; }
    .ql-card:active { transform: translateY(0); }

    /* favicon icon */
    .ql-icon {
      width: 28px; height: 28px; object-fit: contain;
      display: block; margin: 0 auto 7px;
      border-radius: 4px;
    }
    /* fallback emoji hidden by default, shown if img fails */
    .ql-icon-fallback {
      display: none; font-size: 20px; margin-bottom: 7px; line-height: 1;
    }
    .ql-icon.broken { display: none; }
    .ql-icon.broken + .ql-icon-fallback { display: block; }

    .ql-name { font-size: 12px; font-weight: 700; color: var(--text); transition: color 0.18s; }
    .ql-card:hover .ql-name { color: var(--accent); }
    .ql-host {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; color: var(--muted); margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── BOTTOM BAR ── */
    .bottombar {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      gap: 16px; height: 34px; flex-shrink: 0;
      padding: 0 24px; border-top: 1px solid var(--border);
      background: rgba(15,11,5,0.7);
      font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--dim);
    }
    .bb-sep { color: var(--border); }

    @media (max-width: 700px) {
      .topbar { padding: 0 12px; gap: 10px; }
      .pill-row { display: none; }
      .ql-grid { grid-template-columns: repeat(3, 1fr); }
      .tab-item span { display: none; }
      .clock-time { font-size: 52px; letter-spacing: 3px; }
    }
  </style>
</head>
<body>

  <!-- ── TOP BAR ── -->
  <header class="topbar">
    <a href="index.html" class="logo-wrap">
      <img class="logo-img" id="navLogo" alt=""/>
      <span class="logo-name">2Fort Proxy</span>
    </a>
    <div class="bar-div"></div>
    <div class="tab-row">
      <a href="index.html" class="tab-item active">
        <div class="tab-dot"></div>
        <span>Home</span>
      </a>
      <a href="browse.html" class="tab-item"><span>Browse</span></a>
      <a href="apps.html"   class="tab-item"><span>Apps</span></a>
    </div>
    <div class="bar-right">
      <div class="pill-row">
        <div class="status-pill"><div class="s-dot" id="swDot"></div><span id="swText">SW</span></div>
        <div class="status-pill"><div class="s-dot" id="proxyDot"></div><span id="proxyText">Backend</span></div>
      </div>
      <div class="bar-div"></div>
      <a href="settings.html" class="icon-btn" title="Settings">⚙</a>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- Clock -->
    <div class="clock-block">
      <div class="clock-time" id="clockTime">00:00:00</div>
      <div class="clock-date" id="clockDate">MON, JAN 01</div>
      <div class="clock-tz"   id="clockTz">UTC+0</div>
    </div>

    <!-- URL bar -->
    <div class="url-zone">
      <div class="url-label">⌖ &nbsp;Enter URL or search query</div>
      <div class="url-bar">
        <div class="url-scheme">HTTPS://</div>
        <input
          id="q" class="url-input" type="text"
          placeholder="site.com or search anything..."
          autocomplete="off" spellcheck="false"
        />
        <button class="url-go" onclick="doNav()">Go →</button>
      </div>
      <div class="quick-row">
        <span class="quick-lbl">quick:</span>
        <span class="qpill" onclick="fill('https://google.com')">Google</span>
        <span class="qpill" onclick="fill('https://youtube.com')">YouTube</span>
        <span class="qpill" onclick="fill('https://reddit.com')">Reddit</span>
        <span class="qpill" onclick="fill('https://discord.com')">Discord</span>
        <span class="qpill" onclick="fill('https://github.com')">GitHub</span>
        <span class="qpill" onclick="fill('https://store.steampowered.com')">Steam</span>
      </div>
    </div>

    <!-- Section label -->
    <div class="section-divider"><span>Quick Launch</span></div>

    <!-- Grid with real favicons -->
    <div class="grid-wrap">
      <div class="ql-grid" id="qlGrid"></div>
    </div>
  </main>

  <!-- ── ADD SITE MODAL ── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">Add Site</div>
      <div class="modal-field">
        <label>Site Name</label>
        <input id="mName" type="text" placeholder="e.g. Twitch"/>
      </div>
      <div class="modal-field">
        <label>URL</label>
        <input id="mUrl" type="text" placeholder="https://twitch.tv"/>
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-confirm" onclick="confirmAdd()">Add →</button>
      </div>
    </div>
  </div>

  <!-- ── BOTTOM BAR ── -->
  <footer class="bottombar">
    <span>2Fort Proxy</span>
    <span class="bb-sep">·</span>
    <span>Capture the intel</span>
    <span class="bb-sep">·</span>
    <span>Backend required — see README.md</span>
  </footer>

    // ── Clock ─────────────────────────────────────────────
    const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      const s = String(now.getSeconds()).padStart(2,'0');
      document.getElementById('clockTime').textContent = `${h}:${m}:${s}`;
      document.getElementById('clockDate').textContent =
        `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')} ${now.getFullYear()}`;
      // timezone offset
      const off = -now.getTimezoneOffset();
      const sign = off >= 0 ? '+' : '-';
      const oh = String(Math.floor(Math.abs(off)/60)).padStart(2,'0');
      const om = String(Math.abs(off)%60).padStart(2,'0');
      const tz = (Intl.DateTimeFormat().resolvedOptions().timeZone || `UTC${sign}${oh}:${om}`).replace(/_/g, ' ');
      document.getElementById('clockTz').textContent = tz;
    }
    updateClock();
    setInterval(updateClock, 1000);

      { name: 'Khan Academy', url: 'https://khanacademy.org',        host: 'khanacademy.org' },
      { name: 'Twitter / X',  url: 'https://twitter.com',            host: 'twitter.com' },
      { name: 'Wikipedia',    url: 'https://wikipedia.org',          host: 'wikipedia.org' },
    ];

    function loadSites() {
      try { return JSON.parse(localStorage.getItem('2fp-sites')) || DEFAULT_SITES; } catch { return DEFAULT_SITES; }
    }
    function saveSites(sites) {
      localStorage.setItem('2fp-sites', JSON.stringify(sites));
    }

    function hostFrom(url) {
      try { return new URL(url).hostname; } catch { return url.replace(/^https?:\/\//,'').split('/')[0]; }
    }

    function faviconUrl(host) {
      return `https://www.google.com/s2/favicons?domain=${host}&sz=64`;
    }

    function buildGrid() {
      const sites = loadSites();
      const grid = document.getElementById('qlGrid');
      grid.innerHTML = sites.map((site, i) => `
        <div class="ql-card" onclick="go('${site.url}')">
          <button class="ql-del" onclick="delSite(event,${i})" title="Remove">✕</button>
          <img
            class="ql-icon"
            src="${faviconUrl(site.host)}"
            alt="${site.name}"
            onerror="this.classList.add('broken')"
          />
          <div class="ql-icon-fallback">🌐</div>
          <div class="ql-name">${site.name}</div>
          <div class="ql-host">${site.host}</div>
        </div>
      `).join('') + `
        <div class="ql-add" onclick="openModal()">
          <div class="ql-add-icon">+</div>
          <div class="ql-add-lbl">Add Site</div>
        </div>
      `;
    }
    buildGrid();

    function delSite(e, i) {
      e.stopPropagation();
      const sites = loadSites();
      sites.splice(i, 1);
      saveSites(sites);
      buildGrid();
    }

    // ── Modal ─────────────────────────────────────────────
    function openModal() {
      document.getElementById('modalOverlay').classList.add('open');
      setTimeout(() => document.getElementById('mName').focus(), 50);
    }
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('mName').value = '';
      document.getElementById('mUrl').value  = '';
    }
    function confirmAdd() {
      const name = document.getElementById('mName').value.trim();
      let   url  = document.getElementById('mUrl').value.trim();
      if (!name || !url) return;
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      const host = hostFrom(url);
      const sites = loadSites();
      sites.push({ name, url, host });
      saveSites(sites);
      buildGrid();
      closeModal();
    }
    // close on overlay click or Escape
    document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    document.getElementById('mUrl').addEventListener('keydown', e => { if (e.key === 'Enter') confirmAdd(); });

    // ── Navigation ────────────────────────────────────────
    const q = document.getElementById('q');
    q.addEventListener('keydown', e => { if (e.key === 'Enter') doNav(); });
    function fill(url) { q.value = url.replace('https://',''); q.focus(); }
    function go(url) { window.location.href = `browse.html?url=${encodeURIComponent(url)}`; }
    function doNav() {
      let v = q.value.trim(); if (!v) return;
      const isUrl = /^https?:\/\//i.test(v) || /^[a-z0-9-]+\.[a-z]{2,}/i.test(v);
      if (!isUrl) v = `https://www.google.com/search?q=${encodeURIComponent(v)}`;
      else if (!/^https?:\/\//i.test(v)) v = 'https://' + v;
      go(v);
    }

    // ── SW status ─────────────────────────────────────────
    async function checkSW() {
      const dot = document.getElementById('swDot');
      const txt = document.getElementById('swText');
      if (!('serviceWorker' in navigator)) { dot.classList.add('bad'); txt.textContent = 'SW: N/A'; return; }
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        if (regs.length) { dot.classList.add('ok'); txt.textContent = 'SW: Active'; }
        else             { dot.classList.add('bad'); txt.textContent = 'SW: Off'; }
      } catch { dot.classList.add('bad'); txt.textContent = 'SW: Error'; }
    }

    // ── Backend status ────────────────────────────────────
    async function checkBackend() {
      const dot = document.getElementById('proxyDot');
      const txt = document.getElementById('proxyText');
      let cfg = {};
      try { cfg = JSON.parse(localStorage.getItem('2fp-config')) || {}; } catch {}
      if (!cfg.backendUrl) { txt.textContent = 'Backend: —'; return; }
      txt.textContent = 'Backend: …';
      try {
        const r = await fetch(cfg.backendUrl + '/', { signal: AbortSignal.timeout(4000) });
        if (r.ok || r.status < 500) { dot.classList.add('ok'); txt.textContent = 'Backend: OK'; }
        else throw new Error();
      } catch { dot.classList.add('bad'); txt.textContent = 'Backend: Down'; }
    }

    // ── Cloaking & panic ──────────────────────────────────
    (function init() {
      let cfg = {};
      try { cfg = JSON.parse(localStorage.getItem('2fp-config')) || {}; } catch {}
      if (cfg.cloakTitle) document.title = cfg.cloakTitle;
      if (cfg.cloakIcon) {
        const l = document.querySelector("link[rel='icon']") ||
                  Object.assign(document.createElement('link'), {rel:'icon'});
        l.href = cfg.cloakIcon; document.head.appendChild(l);
      }
      if (cfg.panicKey) {
        document.addEventListener('keydown', e => {
          if (e.key !== cfg.panicKey) return;
          cfg.panicClose ? window.close() : (window.location.href = cfg.panicUrl || 'https://google.com');
        });
      }
    })();

    checkSW();
    checkBackend();
  </script>
<script src="static/js/config.js"></script>
  <script src="static/js/register-sw.js"></script>
  <script>
  (async () => {
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));
    await new Promise(r => {
      const req = indexedDB.deleteDatabase('$scramjet');
      req.onsuccess = r;
      req.onerror = r;
    });
  })();
  </script>
</body>
