<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2Fort Proxy — Browse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f0b05;--surface:#1a1008;--card:#201408;--border:#3d2510;--accent:#c87d2f;--gold:#e8a84a;--text:#f0dfc0;--muted:#8a6040;--dim:#4a2e0e;--green:#5dbb63;--red:#c0392b}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
    /* ── BROWSER BAR ── */
    .browser-bar{
      display:flex;align-items:center;height:50px;flex-shrink:0;
      padding:0 12px;gap:8px;
      background:rgba(15,11,5,0.96);
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(10px);
      position:relative;z-index:10;
    }
    .bar-logo-btn{display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0;padding:4px 8px;border-radius:6px;transition:background 0.14s}
    .bar-logo-btn:hover{background:rgba(200,125,47,0.08)}
    .bar-logo-img{width:22px;height:22px;object-fit:contain;mix-blend-mode:screen}
    .bar-logo-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--accent)}
    .bar-div{width:1px;height:20px;background:var(--border);flex-shrink:0}
    /* nav buttons */
    .bar-btn{
      width:28px;height:28px;border-radius:6px;
      background:none;border:1px solid transparent;
      color:var(--muted);font-size:13px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all 0.14s;flex-shrink:0;
    }
    .bar-btn:hover{border-color:var(--border);color:var(--text);background:var(--surface)}
    .bar-btn:disabled{opacity:0.3;cursor:not-allowed}
    /* url bar */
    .bar-url-wrap{
      flex:1;display:flex;align-items:center;
      background:var(--surface);border:1px solid var(--border);
      border-radius:8px;overflow:hidden;transition:border-color 0.15s;
      min-width:0;
    }
    .bar-url-wrap:focus-within{border-color:var(--accent)}
    .bar-lock{padding:0 8px;font-size:12px;flex-shrink:0;color:var(--muted)}
    .bar-url{
      flex:1;background:none;border:none;outline:none;
      color:var(--text);font-family:'JetBrains Mono',monospace;
      font-size:13px;padding:7px 4px;min-width:0;
    }
    .bar-url::placeholder{color:var(--dim)}
    .bar-go{
      background:var(--accent);border:none;color:#0f0b05;
      font-family:'Syne',sans-serif;font-size:12px;font-weight:800;
      padding:0 14px;height:100%;cursor:pointer;flex-shrink:0;
      transition:background 0.15s;letter-spacing:0.5px;
    }
    .bar-go:hover{background:var(--gold)}
    /* right controls */
    .bar-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
    /* ── FRAME AREA ── */
    .frame-wrapper{flex:1;position:relative;overflow:hidden}
    .proxy-frame{width:100%;height:100%;border:none;background:#fff}
    /* splash */
    .frame-splash{
      position:absolute;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      background:var(--bg);text-align:center;padding:32px;
      gap:14px;
    }
    .splash-logo{width:64px;height:64px;object-fit:contain;mix-blend-mode:screen;opacity:0.7;margin-bottom:4px}
    .splash-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--text)}
    .splash-sub{font-size:14px;color:var(--muted);max-width:420px;line-height:1.7}
    .splash-warning{
      font-size:12px;color:var(--dim);max-width:420px;line-height:1.6;
      background:var(--surface);border:1px solid var(--border);
      border-radius:8px;padding:12px 16px;
      font-family:'JetBrains Mono',monospace;
    }
    .splash-warning code{color:var(--accent)}
  </style>
</head>
<body>
  <div class="browser-bar">
    <a href="index.html" class="bar-logo-btn">
      <img class="bar-logo-img" id="barLogo" alt=""/>
      <span class="bar-logo-name">2Fort</span>
    </a>
    <div class="bar-div"></div>
    <button class="bar-btn" id="btnBack"    onclick="frameBack()"    title="Back">◀</button>
    <button class="bar-btn" id="btnForward" onclick="frameForward()" title="Forward">▶</button>
    <button class="bar-btn"                 onclick="frameReload()"  title="Reload">↻</button>
    <div class="bar-url-wrap">
      <span class="bar-lock" id="barLock">🔒</span>
      <input id="barUrl" class="bar-url" type="text" placeholder="Enter URL or search query…" autocomplete="off" spellcheck="false"/>
      <button class="bar-go" onclick="barGo()">Go →</button>
    </div>
    <div class="bar-right">
      <button class="bar-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
      <button class="bar-btn" onclick="openNewTab()"       title="New Tab">⊞</button>
      <a href="settings.html" class="bar-btn" title="Settings">⚙</a>
      <a href="index.html"    class="bar-btn" title="Exit proxy">✕</a>
    </div>
  </div>

  <div class="frame-wrapper">
    <iframe id="proxyFrame" class="proxy-frame"
      sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals allow-pointer-lock"
      allowfullscreen allow="autoplay; fullscreen"></iframe>
    <div class="frame-splash" id="splash">
      <img class="splash-logo" id="splashLogo" alt=""/>
      <div class="splash-title">Ready to Deploy</div>
      <div class="splash-sub">Enter a URL or search query in the bar above to start browsing through the proxy.</div>
      <div class="splash-warning">
        Backend server must be running and configured in Settings.<br/>
        Go to <code>Settings → Backend URL</code> if nothing loads.
      </div>
    </div>
  </div>
